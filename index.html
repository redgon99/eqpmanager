<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>소방 장비 이력 관리 QR 생성기</title>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- QR 코드 생성 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    header {
      background: #d32f2f;
      color: white;
      padding: 24px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin: 8px 0 0;
      opacity: 0.9;
    }

    .container {
      max-width: 1150px;
      margin: 28px auto;
      padding: 0 18px;
    }

    .input-card {
      background: white;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
      margin-bottom: 26px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }

    label {
      font-weight: 700;
      margin-bottom: 6px;
      display: block;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 13px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 15px;
    }

    .notice {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fff4f4;
      color: #b71c1c;
      font-size: 14px;
      line-height: 1.6;
    }

    .button-area {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 13px 20px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .btn-main {
      background: #d32f2f;
      color: white;
    }

    .btn-sub {
      background: #333;
      color: white;
    }

    .btn-danger {
      background: #777;
      color: white;
    }

    .btn-refresh {
      background: #1565c0;
      color: white;
    }

    .table-card {
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
      overflow-x: auto;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .table-title {
      margin: 0;
      font-size: 22px;
      color: #d32f2f;
    }

    .status {
      margin: 0;
      font-size: 14px;
      color: #555;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 950px;
    }

    th {
      background: #f1f1f1;
      padding: 12px;
      border-bottom: 2px solid #ddd;
      font-size: 14px;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: center;
      font-size: 14px;
      vertical-align: middle;
    }

    .memo {
      text-align: left;
      max-width: 260px;
      word-break: keep-all;
    }

    .qr-thumb {
      width: 76px;
      min-height: 76px;
      margin: auto;
      cursor: pointer;
      padding: 4px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .qr-thumb:hover {
      outline: 3px solid #d32f2f;
    }

    .qr-error {
      color: #d32f2f;
      font-size: 11px;
      line-height: 1.4;
      font-weight: bold;
    }

    .empty {
      text-align: center;
      padding: 35px;
      color: #777;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.65);
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: white;
      padding: 28px;
      border-radius: 20px;
      width: 90%;
      max-width: 460px;
      text-align: center;
    }

    .modal-content h2 {
      margin-top: 0;
      color: #d32f2f;
    }

    #largeQr {
      display: flex;
      justify-content: center;
      margin: 20px 0;
      min-height: 280px;
      align-items: center;
    }

    .qr-info {
      background: #f6f6f6;
      padding: 14px;
      border-radius: 12px;
      text-align: left;
      font-size: 14px;
      line-height: 1.7;
      word-break: keep-all;
    }

    .qr-raw {
      margin-top: 12px;
      background: #222;
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-size: 12px;
      word-break: break-all;
      text-align: left;
    }

    .close-btn {
      width: 100%;
      margin-top: 18px;
      background: #d32f2f;
      color: white;
    }

    @media (max-width: 900px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 23px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>소방 장비 이력 관리용 QR 생성기</h1>
    <p>Supabase DB에 장비 정보를 저장하고 QR코드를 생성합니다.</p>
  </header>

  <div class="container">
    <section class="input-card">
      <div class="form-grid">
        <div>
          <label for="equipmentNo">장비번호</label>
          <input id="equipmentNo" type="text" placeholder="예: PUMP-001" />
        </div>

        <div>
          <label for="equipmentName">장비명</label>
          <input id="equipmentName" type="text" placeholder="예: 동력소방펌프" />
        </div>

        <div>
          <label for="memo">간단한 메모</label>
          <input id="memo" type="text" placeholder="예: 1팀 보유 장비" />
        </div>

        <div>
          <label for="lifeYear">내용년수</label>
          <input id="lifeYear" type="number" placeholder="예: 8" min="1" />
        </div>

        <div>
          <label for="inputDate">입력일자</label>
          <input id="inputDate" type="date" />
        </div>
      </div>

      <div class="notice">
        QR코드 용량 초과 오류를 막기 위해 QR 안에는 짧은 형식의 데이터만 저장합니다.<br>
        예: EQ|PUMP-001|동력소방펌프|8|2026-05-14|1팀 보유 장비
      </div>

      <div class="button-area">
        <button class="btn-main" onclick="addEquipment()">QR 생성 및 등록</button>
        <button class="btn-sub" onclick="clearForm()">입력 초기화</button>
        <button class="btn-refresh" onclick="loadEquipments()">새로고침</button>
      </div>
    </section>

    <section class="table-card">
      <div class="table-header">
        <h2 class="table-title">장비 이력 목록</h2>
        <p id="status" class="status">Supabase 연결 대기 중...</p>
      </div>

      <table>
        <thead>
          <tr>
            <th>순번</th>
            <th>QR코드</th>
            <th>장비번호</th>
            <th>장비명</th>
            <th>간단한 메모</th>
            <th>내용년수</th>
            <th>입력일자</th>
            <th>등록일시</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="equipmentTable"></tbody>
      </table>
    </section>
  </div>

  <div id="qrModal" class="modal">
    <div class="modal-content">
      <h2>장비 QR 코드</h2>

      <div id="largeQr"></div>

      <div id="qrInfo" class="qr-info"></div>

      <div id="qrRaw" class="qr-raw"></div>

      <button class="close-btn" onclick="closeModal()">닫기</button>
    </div>
  </div>

  <script>
    /*
      [중요]
      아래 2개 값을 본인의 Supabase 프로젝트 값으로 변경하세요.

      Supabase 위치:
      Project Settings → API → Project URL
      Project Settings → API → anon public key
    */
    const SUPABASE_URL = "https://ainftwifvclgiookzrwm.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpbmZ0d2lmdmNsZ2lvb2t6cndtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTUyMTQyOTMsImV4cCI6MjA3MDc5MDI5M30.fHWOF1nNcen0iehaRh7Z2EWcOufYeeKGT7FH3UHO5XA";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let equipmentList = [];

    const equipmentNoInput = document.getElementById("equipmentNo");
    const equipmentNameInput = document.getElementById("equipmentName");
    const memoInput = document.getElementById("memo");
    const lifeYearInput = document.getElementById("lifeYear");
    const inputDateInput = document.getElementById("inputDate");
    const equipmentTable = document.getElementById("equipmentTable");
    const statusElement = document.getElementById("status");

    inputDateInput.valueAsDate = new Date();

    function setStatus(message) {
      statusElement.textContent = message;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function shortenText(text, maxLength) {
      const value = String(text || "").trim();
      if (value.length > maxLength) {
        return value.substring(0, maxLength);
      }
      return value;
    }

    function cleanQrText(text) {
      return String(text || "")
        .replaceAll("|", "/")
        .replace(/\s+/g, " ")
        .trim();
    }

    function formatDateTime(value) {
      if (!value) return "-";

      const date = new Date(value);

      if (isNaN(date.getTime())) {
        return "-";
      }

      return date.toLocaleString("ko-KR");
    }

    function makeQrText(item) {
      const equipmentNo = cleanQrText(item.equipment_no);
      const equipmentName = cleanQrText(item.equipment_name);
      const lifeYear = cleanQrText(item.life_year);
      const inputDate = cleanQrText(item.input_date);
      const memo = cleanQrText(shortenText(item.memo, 30));

      return [
        "EQ",
        equipmentNo,
        equipmentName,
        lifeYear,
        inputDate,
        memo
      ].join("|");
    }

    function createQRCode(targetElement, text, size) {
      targetElement.innerHTML = "";

      try {
        new QRCode(targetElement, {
          text: text,
          width: size,
          height: size,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M
        });
      } catch (error) {
        console.error("QR 생성 오류:", error);

        targetElement.innerHTML = `
          <div class="qr-error">
            QR 생성 실패<br>
            입력 내용이 너무 깁니다.
          </div>
        `;
      }
    }

    async function loadEquipments() {
      setStatus("Supabase에서 장비 목록을 불러오는 중...");

      const { data, error } = await supabaseClient
        .from("equipments")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        console.error("조회 오류:", error);
        setStatus("조회 실패: " + error.message);
        return;
      }

      equipmentList = data || [];
      renderTable();
      setStatus("총 " + equipmentList.length + "건 조회 완료");
    }

    async function addEquipment() {
      const equipmentNo = equipmentNoInput.value.trim();
      const equipmentName = equipmentNameInput.value.trim();
      const memo = memoInput.value.trim();
      const lifeYear = lifeYearInput.value.trim();
      const inputDate = inputDateInput.value;

      if (!equipmentNo || !equipmentName || !lifeYear || !inputDate) {
        alert("장비번호, 장비명, 내용년수, 입력일자는 반드시 입력하세요.");
        return;
      }

      if (equipmentNo.length > 40) {
        alert("장비번호는 40자 이내로 입력하는 것을 권장합니다.");
        return;
      }

      if (equipmentName.length > 40) {
        alert("장비명은 40자 이내로 입력하는 것을 권장합니다.");
        return;
      }

      const insertData = {
        equipment_no: equipmentNo,
        equipment_name: equipmentName,
        memo: memo,
        life_year: Number(lifeYear),
        input_date: inputDate
      };

      setStatus("Supabase에 저장 중...");

      const { error } = await supabaseClient
        .from("equipments")
        .insert(insertData);

      if (error) {
        console.error("등록 오류:", error);
        alert("등록 실패: " + error.message);
        setStatus("등록 실패");
        return;
      }

      clearForm();
      await loadEquipments();
      setStatus("장비 정보가 등록되었습니다.");
    }

    function clearForm() {
      equipmentNoInput.value = "";
      equipmentNameInput.value = "";
      memoInput.value = "";
      lifeYearInput.value = "";
      inputDateInput.valueAsDate = new Date();
      equipmentNoInput.focus();
    }

    async function deleteEquipment(id) {
      if (!confirm("이 장비 정보를 삭제할까요?")) return;

      setStatus("삭제 중...");

      const { error } = await supabaseClient
        .from("equipments")
        .delete()
        .eq("id", id);

      if (error) {
        console.error("삭제 오류:", error);
        alert("삭제 실패: " + error.message);
        setStatus("삭제 실패");
        return;
      }

      await loadEquipments();
      setStatus("장비 정보가 삭제되었습니다.");
    }

    function renderTable() {
      equipmentTable.innerHTML = "";

      if (equipmentList.length === 0) {
        equipmentTable.innerHTML = `
          <tr>
            <td colspan="9" class="empty">등록된 장비가 없습니다.</td>
          </tr>
        `;
        return;
      }

      equipmentList.forEach((item, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${equipmentList.length - index}</td>
          <td>
            <div id="qr-${item.id}" class="qr-thumb" onclick="openModal(${item.id})"></div>
          </td>
          <td>${escapeHtml(item.equipment_no)}</td>
          <td>${escapeHtml(item.equipment_name)}</td>
          <td class="memo">${escapeHtml(item.memo || "-")}</td>
          <td>${escapeHtml(item.life_year)}년</td>
          <td>${escapeHtml(item.input_date)}</td>
          <td>${escapeHtml(formatDateTime(item.created_at))}</td>
          <td>
            <button class="btn-danger" onclick="deleteEquipment(${item.id})">삭제</button>
          </td>
        `;

        equipmentTable.appendChild(tr);

        const qrTarget = document.getElementById(`qr-${item.id}`);
        const qrText = makeQrText(item);

        createQRCode(qrTarget, qrText, 64);
      });
    }

    function openModal(id) {
      const item = equipmentList.find(e => e.id === id);

      if (!item) return;

      const modal = document.getElementById("qrModal");
      const largeQr = document.getElementById("largeQr");
      const qrInfo = document.getElementById("qrInfo");
      const qrRaw = document.getElementById("qrRaw");

      const qrText = makeQrText(item);

      createQRCode(largeQr, qrText, 280);

      qrInfo.innerHTML = `
        <strong>장비번호:</strong> ${escapeHtml(item.equipment_no)}<br>
        <strong>장비명:</strong> ${escapeHtml(item.equipment_name)}<br>
        <strong>간단한 메모:</strong> ${escapeHtml(item.memo || "-")}<br>
        <strong>내용년수:</strong> ${escapeHtml(item.life_year)}년<br>
        <strong>입력일자:</strong> ${escapeHtml(item.input_date)}<br>
        <strong>등록일시:</strong> ${escapeHtml(formatDateTime(item.created_at))}
      `;

      qrRaw.innerHTML = `
        <strong>QR 저장 내용</strong><br>
        ${escapeHtml(qrText)}
      `;

      modal.style.display = "flex";
    }

    function closeModal() {
      document.getElementById("qrModal").style.display = "none";
    }

    window.onclick = function(event) {
      const modal = document.getElementById("qrModal");

      if (event.target === modal) {
        closeModal();
      }
    };

    async function init() {
      if (
        SUPABASE_URL.includes("여기에") ||
        SUPABASE_ANON_KEY.includes("여기에")
      ) {
        setStatus("Supabase URL과 ANON KEY를 먼저 입력하세요.");

        equipmentTable.innerHTML = `
          <tr>
            <td colspan="9" class="empty">
              코드 안의 SUPABASE_URL, SUPABASE_ANON_KEY 값을 입력해야 합니다.
            </td>
          </tr>
        `;

        return;
      }

      await loadEquipments();

      /*
        여러 PC에서 동시에 사용할 경우,
        Supabase Realtime이 켜져 있으면 자동 갱신됩니다.
      */
      supabaseClient
        .channel("equipments-realtime")
        .on(
          "postgres_changes",
          {
            event: "*",
            schema: "public",
            table: "equipments"
          },
          function() {
            loadEquipments();
          }
        )
        .subscribe();
    }

    init();
  </script>
</body>
</html>
